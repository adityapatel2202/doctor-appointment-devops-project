<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card form-card">
            <h2>Doctor Registration</h2>
            <p class="subtitle">Create your doctor account</p>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <p class="flash-message">{{ message }}</p>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <label for="name">Doctor Name</label>
                <input type="text" id="name" name="name" placeholder="Enter doctor name" required>

                <label for="specialization">Specialization</label>
                <input type="text" id="specialization" name="specialization" placeholder="Enter specialization" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>

                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" placeholder="Enter phone number">

                <label for="qualification">Qualification</label>
                <input type="text" id="qualification" name="qualification" placeholder="Enter qualification">

                <label for="experience">Experience</label>
                <input type="text" id="experience" name="experience" placeholder="Enter experience (e.g. 5 years)">

                <button type="submit" class="btn">Register</button>
            </form>

            <p class="small-text">
                Already have an account?
                <a href="{{ url_for('doctor_login') }}">Login here</a>
            </p>
        </div>
    </div>
</body>
</html>
