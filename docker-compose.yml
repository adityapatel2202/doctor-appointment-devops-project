version: "3.8"

services:
  auth-service:
    build: ./auth_service
    container_name: auth-container
    ports:
      - "5001:5000"

  booking-service:
    build: ./booking_service
    container_name: booking-container
    ports:
      - "5002:5000"

  main-app:
    build: ./main_app
    container_name: main-app-container
    ports:
      - "5000:5000"
    depends_on:
      - auth-service
      - booking-service